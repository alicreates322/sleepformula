<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SleepFormula — Free Sleep Health Tools</title>
  <meta name="description" content="Free science-backed sleep tools. Sleep calculator, chronotype quiz, sleep debt tracker, caffeine cutoff calculator and more." />

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #FFD700;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    button {
      font-family: inherit;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333300;
      background: #111;
      color: #FFD700;
      font-size: 14px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #FFD700;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const C = {
  bg: "#000000",
  surface: "#111111",
  border: "#333300",
  accent: "#FFD700",
  accentDim: "#996600",
  accentSoft: "rgba(255,215,0,0.12)",
  text: "#FFD700",
  muted: "#CCAA00",
  danger: "#f27d6a",
  warn: "#f5a623",
  good: "#a8e063"
};

function Btn({ children, onClick, style = {} }) {
  return (
    <button
      onClick={onClick}
      style={{
        padding: "12px 22px",
        border: "none",
        borderRadius: "8px",
        background: C.accent,
        color: C.bg,
        fontWeight: 600,
        cursor: "pointer",
        ...style
      }}
    >
      {children}
    </button>
  );
}

function Card({ children, style = {} }) {
  return (
    <div
      style={{
        background: C.surface,
        border: `1px solid ${C.border}`,
        borderRadius: "16px",
        padding: "24px",
        ...style
      }}
    >
      {children}
    </div>
  );
}

function App() {
  const [time, setTime] = useState("07:00");
  const [results, setResults] = useState([]);

  function calculateSleepTimes() {
    const [h, m] = time.split(":").map(Number);
    const base = h * 60 + m;
    const cycle = 90;
    const output = [];

    for (let c = 6; c >= 3; c--) {
      let t = base - (c * cycle) - 15;

      if (t < 0) t += 1440;

      const th = Math.floor(t / 60) % 24;
      const tm = t % 60;

      output.push(
        `${String(th).padStart(2, "0")}:${String(tm).padStart(2, "0")}`
      );
    }

    setResults(output);
  }

  return (
    <div style={{ maxWidth: "800px", margin: "0 auto", padding: "40px 20px" }}>
      <h1
        style={{
          fontFamily: "'DM Serif Display', serif",
          fontSize: "48px",
          marginBottom: "12px"
        }}
      >
        SleepFormula 🌙
      </h1>

      <p style={{ color: C.muted, marginBottom: "32px" }}>
        Free science-backed sleep tools to improve your sleep.
      </p>

      <Card style={{ marginBottom: "20px" }}>
        <h2 style={{ marginBottom: "16px" }}>Sleep Cycle Calculator</h2>

        <label style={{ display: "block", marginBottom: "10px" }}>
          Wake-up Time
        </label>

        <input
          type="time"
          value={time}
          onChange={(e) => setTime(e.target.value)}
        />

        <Btn
          onClick={calculateSleepTimes}
          style={{
            marginTop: "16px",
            width: "100%"
          }}
        >
          Calculate Sleep Times
        </Btn>
      </Card>

      {results.length > 0 && (
        <Card>
          <h3 style={{ marginBottom: "16px" }}>
            Best times to go to bed:
          </h3>

          <div style={{ display: "grid", gap: "12px" }}>
            {results.map((r, i) => (
              <div
                key={i}
                style={{
                  padding: "14px",
                  border: `1px solid ${C.border}`,
                  borderRadius: "10px",
                  fontSize: "24px",
                  fontFamily: "'DM Serif Display', serif"
                }}
              >
                {r}
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App />);
</script>

</body>
</html>
